version: '3.8'
services:
  
  consul:
    restart: always
    container_name: consul
    networks:
      - proxus
    
    ports:
      - "8300:8300"
      - "8301:8301"
      - "8301:8301/udp"
      - "8500:8500"
      - "8502:8502"
      - "8600:8600"
      - "8600:8600/udp"
    image: hashicorp/consul
    environment:
      CONSUL_LOCAL_CONFIG: >-
        {
          "datacenter": "dc1",
          "bootstrap": true,
          "server": true,
          "node_name": "consul1",
          "bind_addr": "0.0.0.0",
          "client_addr": "0.0.0.0",
          "bootstrap_expect": 1,
          "ui": true,
          "addresses" : {
            "http" : "0.0.0.0"
          },
          "ports": {
            "http": 8500
          },
          "log_level": "ERROR"
        }
  
  timescaledb:
    restart: always
    container_name: timescaledb
    image: timescale/timescaledb-ha:pg16 # HA image includes the TimescaleDB Toolkit, and support for PostGIS and Patroni but does not support ARM64. For ARM64 environments, use the timescaledb Docker image. 
    # image: timescale/timescaledb:latest-pg16
    command: postgres -c shared_preload_libraries=timescaledb -p 5442
    user: "0"
    volumes:
      - type: volume
        source: proxus-db-volume
        # target: /var/lib/postgresql/data # Non HA image data location
        target: /home/postgres/pgdata/data
        read_only: false
    networks:
      - proxus
    ports:
      - "5442:5442"
    environment:
      - POSTGRES_DB=proxus
      - POSTGRES_USER=proxus
      - POSTGRES_PASSWORD=proxus
  
  proxus-api:
    restart: always
    container_name: proxus-api
    image: proxusplatform/proxus-api:latest
    user: "0"
    networks:
      - proxus
    ports:
      - "8082:8082"
    volumes:
      - type: volume
        source: config
        target: /app/config
        read_only: false
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8081
      - DOTNET_SYSTEM_GLOBALIZATION_INVARIANT=false
  
  proxus-server:
    restart: always
    container_name: proxus-server
    image: proxusplatform/proxus-server:latest
    user: "0"
    networks:
      - proxus
    ports:
      - "8083:8083"
      - "1883:1883"
    volumes:
      - type: volume
        source: config
        target: /app/config
        read_only: false
    environment:
      - DOTNET_SYSTEM_GLOBALIZATION_INVARIANT=false
      - AdvertisedHost=proxus-server
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8083
      - CONSUL_HTTP_ADDR=consul:8500
    
    command: [ "./Proxus.Server",
               "GatewayID=1",
               "EdgeMode=Proxus",
               "GrpcInterfaceBinding=AdvertisedHost",
               "IdentityLookupStrategy=PartitionIdentityLookup",
               "UI-Address=proxus-ui",
               "ClusterProvider=Consul" ]
    
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8083/healthz | grep -q 'Healthy' || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
  
  
  proxus-ui:
    restart: always
    container_name: proxus-ui
    image: proxusplatform/proxus-ui:latest
    user: "0"
    networks:
      - proxus
    ports:
      - "8080:8080"
    volumes:
      - type: volume
        source: config
        target: /app/config
        read_only: false
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DOTNET_SYSTEM_GLOBALIZATION_INVARIANT=false
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - CONSUL_HTTP_ADDR=consul:8500
      - AdvertisedHost=proxus-ui
      - TZ=Europe/Istanbul  # Set the timezone for the container
    command: [ "./Proxus.Blazor.Server",
               "GrpcInterfaceBinding=AdvertisedHost",
               "IdentityLookupStrategy=PartitionIdentityLookup",
               "ClusterProvider=Consul" ]
    
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8080/healthz | grep -q 'Healthy' || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5

  grafana:
    networks:
      - proxus
    user: "0"
    image: grafana/grafana
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - grafana-config:/etc/grafana
      - grafana-config:/var/lib/grafana
    ports:
      - 3000:3000

  prometheus:
    networks:
      - proxus
    user: "0"
    image: prom/prometheus
    volumes:
      - prometheus-config:/etc/prometheus
    ports:
      - 9090:9090

networks:
  proxus:
    driver: bridge

volumes:
  proxus-db-volume:
  config:
  grafana-config:
  prometheus-config:
